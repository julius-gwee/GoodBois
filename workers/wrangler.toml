name = "goodbois"
main = "src/index.ts"
compatibility_date = "2026-05-09"

# AI binding (Whisper STT, MeloTTS) — used today.
[ai]
binding = "AI"

# WORKER_URL is intentionally NOT set here. The worker derives its public
# origin from `c.req.url.origin` at request time, which is correct in both
# `wrangler dev` (localhost) and deployed prod (workers.dev or custom
# domain). Add it back to [env.production.vars] only if you ever need to
# override that — e.g. serving receipts through a different domain than the
# worker itself.
[vars]
ONEMAP_API_BASE_URL = "https://www.onemap.gov.sg"
ONEMAP_WHEELCHAIR_ROUTE_TYPE = "walk"

# ---------------------------------------------------------------------------
# Persistence bindings.
#
# KV   = ephemeral KioskSession state, wiped after each terminal turn.
# D1   = durable artifacts (locations / receipts / cases audit trail).
# R2   = NOT YET USED — reserved for generated receipt PDFs (Phase 5).
#
# Before `wrangler dev` will start with these enabled, run:
#   npx wrangler kv:namespace create SESSION_KV
#   npx wrangler d1 create goodbois
# and paste the returned IDs into the placeholders below.
#
# Then apply the schema to your local D1 SQLite mirror:
#   npx wrangler d1 migrations apply goodbois --local
# ---------------------------------------------------------------------------

[[kv_namespaces]]
binding = "SESSION_KV"
id = "97e6a6347e584c5f80870af45dcb3673"

[[d1_databases]]
binding = "DB"
database_name = "goodbois"
database_id = "1e13f482-3d39-4599-9c48-e166d3360ed6"

# [[r2_buckets]]
# binding = "RECEIPTS"
# bucket_name = "goodbois-receipts"

# Configure secrets with Wrangler, never in this file:
#   wrangler secret put SEALION_API_KEY
#   wrangler secret put ONEMAP_ACCESS_TOKEN  (NTH map render only)
